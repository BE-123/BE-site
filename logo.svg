<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 44">
  <!-- Outer ring -->
  <circle cx="22" cy="22" r="20" fill="none" stroke="#c9a84c" stroke-width="1.2"/>
  <!-- Middle dashed ring -->
  <circle cx="22" cy="22" r="12" fill="none" stroke="#c9a84c" stroke-width="0.7" stroke-dasharray="3 2.5" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="22" cy="22" r="3" fill="#c9a84c"/>
  <!-- Orbit dot top -->
  <circle cx="22" cy="2" r="2.8" fill="#0e0e0e"/>
  <!-- Orbit dot right -->
  <circle cx="42" cy="22" r="1.8" fill="#c9a84c" opacity="0.45"/>
  <!-- Subtle diagonal -->
  <line x1="6" y1="6" x2="38" y2="38" stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>

  <!-- BETA wordmark -->
  <text x="52" y="17"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="14"
    font-weight="400"
    fill="#0e0e0e"
    letter-spacing="1.5">BETA</text>

  <!-- Gold divider line -->
  <line x1="52" y1="21" x2="172" y2="21" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>

  <!-- ENDEAVORS wordmark -->
  <text x="52" y="34"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="9"
    font-weight="400"
    fill="#c9a84c"
    letter-spacing="3.2">ENDEAVORS</text>
</svg>
