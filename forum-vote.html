<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Five-Star Forum — Topic Vote</title>
  <style>
    /* ─── Base ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f5;
      --card: #ffffff;
      --border: #e4e3df;
      --accent: #1a6b3c;
      --accent-light: #e8f5ee;
      --accent-hover: #155530;
      --text: #1c1c1a;
      --muted: #6b6b67;
      --done-bg: #f3f3f1;
      --done-text: #aaa9a5;
      --voted-bg: #e8f5ee;
      --voted-border: #1a6b3c;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 8px rgba(0,0,0,.04);
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── Auth overlay ──────────────────────────────────────────── */
    #auth-overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      z-index: 100;
      padding: 24px;
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%; max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
      text-align: center;
    }

    .auth-card .logo {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .auth-card h1 {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -.3px;
    }

    .auth-card .subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .auth-card label {
      display: block;
      text-align: left;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .auth-card input, .auth-card select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      color: var(--text);
      background: #fff;
      margin-bottom: 16px;
      outline: none;
      transition: border-color .15s;
    }

    .auth-card input:focus, .auth-card select:focus {
      border-color: var(--accent);
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      margin-top: 4px;
    }

    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:active { transform: scale(.98); }

    .auth-error {
      color: #c0392b;
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
    }

    /* ─── Step indicator ────────────────────────────────────────── */
    .steps {
      display: flex; gap: 8px; justify-content: center;
      margin-bottom: 28px;
    }

    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background .2s;
    }
    .step-dot.active { background: var(--accent); }

    /* ─── Main app ──────────────────────────────────────────────── */
    #app { display: none; }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo { font-size: 1.3rem; }

    .header-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -.2px;
    }

    .header-sub {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .header-user {
      display: flex; align-items: center; gap: 8px;
    }

    .user-badge {
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .sign-out-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .sign-out-btn:hover { border-color: var(--muted); color: var(--text); }

    /* ─── Content ───────────────────────────────────────────────── */
    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    .section-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-header {
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -.2px;
    }

    .section-meta {
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ─── Topic row ─────────────────────────────────────────────── */
    .topic-row {
      display: flex;
      align-items: center;
      padding: 13px 22px;
      border-bottom: 1px solid var(--border);
      gap: 14px;
      transition: background .1s;
    }

    .topic-row:last-child { border-bottom: none; }
    .topic-row:hover:not(.done) { background: #fafaf8; }

    .topic-row.done {
      background: var(--done-bg);
    }

    .topic-row.my-voted {
      background: var(--voted-bg);
    }

    .topic-text {
      flex: 1;
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .topic-row.done .topic-text {
      text-decoration: line-through;
      color: var(--done-text);
    }

    .done-badge {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--done-text);
      background: #e8e8e5;
      border-radius: 20px;
      padding: 2px 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .vote-area {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .vote-count {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--muted);
      min-width: 18px;
      text-align: right;
    }

    .vote-count.has-votes { color: var(--accent); }

    .vote-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: all .15s;
      flex-shrink: 0;
    }

    .vote-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .vote-btn.voted {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .vote-btn:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .voters-list {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ─── Footer note ───────────────────────────────────────────── */
    .footer-note {
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 32px;
    }

    /* ─── Loading ───────────────────────────────────────────────── */
    .loading-row {
      padding: 16px 22px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ─── Responsive ────────────────────────────────────────────── */
    @media (max-width: 500px) {
      .auth-card { padding: 32px 20px; }
      header { padding: 12px 16px; }
      main { padding: 20px 12px 48px; }
      .topic-row { padding: 12px 14px; }
      .section-header { padding: 14px 14px 12px; }
      .voters-list { display: none; }
    }
  </style>
</head>

  // ─────────────────────────────────────────────────────────────

  window.checkCode = function() {
    const val = document.getElementById('code-input').value.trim();
    const err = document.getElementById('code-error');

    if (val.toUpperCase() === ACCESS_CODE.toUpperCase()) {
      err.style.display = 'none';
      // advance to step 2
      document.getElementById('step-code').style.display = 'none';
      document.getElementById('step-name').style.display = 'block';
      document.getElementById('dot-1').classList.remove('active');
      document.getElementById('dot-2').classList.add('active');
    } else {
      err.style.display = 'block';
      document.getElementById('code-input').focus();
    }
  };

  window.enterApp = function() {
    const name = document.getElementById('name-select').value;
    const err  = document.getElementById('name-error');
    if (!name) { err.style.display = 'block'; return; }
    err.style.display = 'none';

    currentUser = name;
    localStorage.setItem('forum_user', name);

    // init Firebase and render
    initFirebase();
  };

  window.signOut = function() {
    if (unsubscribe) unsubscribe();
    currentUser = null;
    localStorage.removeItem('forum_user');
    document.getElementById('app').style.display = 'none';
    document.getElementById('auth-overlay').style.display = 'flex';
    document.getElementById('step-code').style.display = 'block';
    document.getElementById('step-name').style.display = 'none';
    document.getElementById('code-input').value = '';
    document.getElementById('dot-1').classList.add('active');
    document.getElementById('dot-2').classList.remove('active');
  };

  // Allow pressing Enter in the code input
  document.getElementById('code-input').addEventListener('keydown', e => {

  // ─────────────────────────────────────────────────────────────
  // 🔥  FIREBASE INIT
  // ─────────────────────────────────────────────────────────────
  function initFirebase() {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);

    document.getElementById('user-display').textContent = currentUser;
    document.getElementById('auth-overlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    subscribeToVotes();
  }

  // ─────────────────────────────────────────────────────────────
  // 📡  REALTIME VOTE LISTENER
  // ─────────────────────────────────────────────────────────────
  function subscribeToVotes() {
    const votesRef = collection(db, 'votes');
    unsubscribe = onSnapshot(votesRef, snapshot => {
      // Rebuild allVotes map
      allVotes = {};
      snapshot.forEach(docSnap => {
        const { topicId, name } = docSnap.data();
        if (!allVotes[topicId]) allVotes[topicId] = new Set();
        allVotes[topicId].add(name);
      });
      renderSections();
    });
  }

  // ─────────────────────────────────────────────────────────────
  // 🎨  RENDER

  function renderSections() {
    renderList('fsfe',     TOPICS.fsfe,     'fsfe-list',     'fsfe-meta');

  }

    const metaEl    = document.getElementById(metaId);

    const active = topics.filter(t => !t.done);
    const total  = active.reduce((sum, t) => sum + (allVotes[t.id]?.size || 0), 0);
    metaEl.textContent = `${active.length} topics · ${total} vote${total !== 1 ? 's' : ''} cast`;

    // Sort active topics by vote count desc, done items at bottom
    const sorted = [
      ...active.sort((a, b) => (allVotes[b.id]?.size || 0) - (allVotes[a.id]?.size || 0)),
      ...topics.filter(t => t.done)
    ];

    container.innerHTML = sorted.map(topic => renderTopicRow(topic)).join('');

    // Attach vote handlers
    container.querySelectorAll('[data-topic-id]').forEach(btn => {
      btn.addEventListener('click', () => toggleVote(btn.dataset.topicId));
    });
  }

  function renderTopicRow(topic) {
    const voters  = allVotes[topic.id] || new Set();
    const count   = voters.size;
    const iVoted  = voters.has(currentUser);
    const votersArr = [...voters];

    if (topic.done) {
      return `
        <div class="topic-row done">
          <span class="topic-text">${escHtml(topic.text)}</span>
          <span class="done-badge">✓ Done</span>
        </div>`;
    }

    const voterLabel = votersArr.length
      ? `<span class="voters-list">${votersArr.join(', ')}</span>`
      : '';

    return `
      <div class="topic-row${iVoted ? ' my-voted' : ''}">
        <span class="topic-text">${escHtml(topic.text)}</span>
        ${voterLabel}
        <div class="vote-area">
          <span class="vote-count${count > 0 ? ' has-votes' : ''}">${count || ''}</span>
          <button
            class="vote-btn${iVoted ? ' voted' : ''}"
            data-topic-id="${topic.id}"
            title="${iVoted ? 'Remove your vote' : 'Upvote this topic'}"
          >▲</button>
        </div>
      </div>`;
  }

  // ─────────────────────────────────────────────────────────────
  // 🗳️  VOTE TOGGLE
  // ─────────────────────────────────────────────────────────────
  async function toggleVote(topicId) {
    if (!db || !currentUser) return;

    const docId  = `${topicId}_${currentUser.toLowerCase()}`;
    const docRef = doc(db, 'votes', docId);
    const voters = allVotes[topicId] || new Set();

    if (voters.has(currentUser)) {
      await deleteDoc(docRef);
    } else {
      await setDoc(docRef, {
        topicId,
        name: currentUser,
        timestamp: Date.now()
      });
    }
    // onSnapshot will fire and re-render automatically
  }

  // ─────────────────────────────────────────────────────────────
  // 🛠  UTILS
  // ─────────────────────────────────────────────────────────────
  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ─────────────────────────────────────────────────────────────
  // 🚀  CHECK FOR SAVED SESSION
  // ─────────────────────────────────────────────────────────────
  // (Optional convenience: skip re-auth on same device. Remove if unwanted.)
  // Deliberately not auto-entering since we want name re-confirmation per session.
</script>
